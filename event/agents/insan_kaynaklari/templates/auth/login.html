<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — HR Ajanı</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .login-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,.1); padding: 40px; width: 360px; }
    .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .login-logo-icon { width: 48px; height: 48px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 18px; }
    .login-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .login-subtitle { font-size: 13px; color: var(--text-muted); }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .btn-login { width: 100%; padding: 10px; font-size: 14px; }
    .demo-info { margin-top: 20px; padding: 12px; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; font-size: 12px; color: #0369a1; }
    .demo-info strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">HR</div>
      <div>
        <div class="login-title">HR Ajanı</div>
        <div class="login-subtitle">İnsan Kaynakları Yönetimi</div>
      </div>
    </div>

    {% if error %}
    <div class="alert alert-danger" style="margin-bottom:16px">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/login" class="login-form">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" name="email" placeholder="ornek@sirket.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-login">Giriş Yap</button>
    </form>

    <div class="demo-info">
      <strong>Demo hesaplar:</strong>
      hr.admin@sirket.com / Admin123<br>
      hr.manager@sirket.com / Manager123<br>
      zeynep.kaya@sirket.com / Employee123
    </div>
  </div>
</body>
</html>
