{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block page_title_block %}{{ page_title }}{% endblock %}

{% block content %}
<div class="container-fluid py-3" style="max-width:680px;">
  <form method="post" action="{% if edit_mode %}/vendors/{{ vendor.id }}/edit{% else %}/vendors/new{% endif %}">

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-bottom py-3">
        <h6 class="mb-0 fw-semibold"><i class="bi bi-building me-2 text-primary"></i>Tedarikçi Bilgileri</h6>
      </div>
      <div class="card-body">

        <div class="mb-3">
          <label class="form-label fw-semibold">Tedarikçi Adı <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control"
                 value="{{ vendor.name if vendor else '' }}" required>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Vergi Numarası</label>
            <input type="text" name="tax_number" class="form-control"
                   value="{{ vendor.tax_number if vendor else '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Vergi Dairesi</label>
            <input type="text" name="tax_office" class="form-control"
                   value="{{ vendor.tax_office if vendor else '' }}">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Adres</label>
          <textarea name="address" class="form-control" rows="2">{{ vendor.address if vendor else '' }}</textarea>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">E-posta</label>
            <input type="email" name="email" class="form-control"
                   value="{{ vendor.email if vendor else '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Telefon</label>
            <input type="text" name="phone" class="form-control"
                   value="{{ vendor.phone if vendor else '' }}">
          </div>
        </div>

        <div class="mb-3" style="max-width:200px;">
          <label class="form-label fw-semibold">Ödeme Vadesi (gün)</label>
          <div class="input-group">
            <input type="number" name="payment_term" class="form-control" min="0" max="365"
                   value="{{ vendor.payment_term if vendor else 30 }}">
            <span class="input-group-text">gün</span>
          </div>
          <div class="form-text">Fatura girişinde vade tarihi otomatik hesaplanır.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Notlar</label>
          <textarea name="notes" class="form-control" rows="2">{{ vendor.notes if vendor else '' }}</textarea>
        </div>

      </div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-lg me-1"></i>
        {% if edit_mode %}Güncelle{% else %}Kaydet{% endif %}
      </button>
      <a href="{% if edit_mode %}/vendors/{{ vendor.id }}{% else %}/vendors{% endif %}"
         class="btn btn-outline-secondary">İptal</a>
      {% if edit_mode %}
      <form method="post" action="/vendors/{{ vendor.id }}/delete" class="ms-auto"
            onsubmit="return confirm('{{ vendor.name }} tedarikçisini silmek istediğinizden emin misiniz?')">
        <button type="submit" class="btn btn-outline-danger btn-sm">
          <i class="bi bi-trash me-1"></i>Sil
        </button>
      </form>
      {% endif %}
    </div>

  </form>
</div>
{% endblock %}
