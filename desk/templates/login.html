<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap — PrizmaDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #2563eb 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .logo-text {
      font-size: 52px;
      font-weight: 900;
      color: #2563eb;
      letter-spacing: -2px;
      line-height: 1;
    }
    .logo-sub {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .btn-login {
      background: #2563eb;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 15px;
      padding: 12px;
      border-radius: 8px;
      transition: background .2s;
    }
    .btn-login:hover { background: #1d4ed8; color: white; }
    .divider { height: 1px; background: #e2e8f0; margin: 20px 0; }
    label { font-size: 13px; font-weight: 600; color: #1e293b; }
    .input-group-text { background: #f8fafc; border-color: #e2e8f0; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="text-center mb-4">
    <div class="logo-text">PrizmaDesk</div>
    <div class="logo-sub">Finans Yönetim Sistemi</div>
  </div>

  {% if error %}
  <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3" role="alert">
    <i class="bi bi-exclamation-circle-fill"></i>
    <small>{{ error }}</small>
  </div>
  {% endif %}

  <form method="post" action="/login" autocomplete="on">
    <div class="mb-3">
      <label for="email" class="form-label">E-posta Adresi</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="ornek@firma.com"
          value="{{ email_value or '' }}"
          autocomplete="email"
          required
          autofocus
        >
      </div>
    </div>

    <div class="mb-4">
      <label for="password" class="form-label">Şifre</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
        <button
          class="btn btn-outline-secondary"
          type="button"
          id="togglePassword"
          tabindex="-1"
          title="Şifreyi göster/gizle"
        >
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-login w-100">
      <i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap
    </button>
  </form>

  <div class="divider"></div>
  <p class="text-center text-muted mb-0" style="font-size:12px;">
    Şifrenizi mi unuttunuz? Lütfen sistem yöneticinizle iletişime geçin.
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePassword').addEventListener('click', function () {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });
</script>
</body>
</html>
