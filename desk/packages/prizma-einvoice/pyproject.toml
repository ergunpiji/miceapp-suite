[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "prizma-einvoice"
version = "0.1.0"
description = "Türkiye e-Fatura/e-Arşiv pluggable entegrasyon modülü (giden + gelen, özel entegratör API)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "Prizmatik" }]
dependencies = [
  "fastapi>=0.95",
  "sqlalchemy>=2.0",
  "httpx>=0.24",
  "jinja2>=3.0",
  "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-asyncio>=0.21"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
prizma_einvoice = ["templates/*.html", "templates/**/*.html"]
