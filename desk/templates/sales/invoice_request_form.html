{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white border-bottom">
        <h6 class="mb-0 fw-bold"><i class="bi bi-receipt me-2"></i>Fatura Talebi</h6>
      </div>
      <div class="card-body p-4">
        <form method="post">

          <!-- Müşteri -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Müşteri <span class="text-danger">*</span></label>
            <select name="customer_id" class="form-select" required>
              <option value="">— Seçiniz —</option>
              {% for c in customers %}
              <option value="{{ c.id }}" {% if sreq and sreq.customer_id == c.id %}selected{% endif %}>
                {{ c.name }} ({{ c.code }})
              </option>
              {% endfor %}
            </select>
          </div>

          <!-- Referans (opsiyonel) -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Referans</label>
            <select name="ref_id" class="form-select">
              <option value="">— Referans seçin (opsiyonel) —</option>
              {% for r in refs %}
              <option value="{{ r.id }}" {% if sreq and sreq.ref_id == r.id %}selected{% endif %}>
                {{ r.ref_no }} — {{ r.title | truncate(50) }}
              </option>
              {% endfor %}
            </select>
            <div class="form-text">İşin referansını seçerseniz muhasebe daha hızlı işler.</div>
          </div>

          <!-- Açıklama -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Açıklama <span class="text-danger">*</span></label>
            <input type="text" name="description" class="form-control" required
                   value="{{ sreq.description if sreq else '' }}"
                   placeholder="Fatura açıklaması (fatura üzerinde görünecek)">
          </div>

          <!-- Tutar + KDV -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Tutar (KDV hariç) <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text">₺</span>
                <input type="number" name="amount" class="form-control" required min="0" step="0.01"
                       value="{{ sreq.amount if sreq else '' }}"
                       placeholder="0,00">
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">KDV Oranı</label>
              <select name="vat_rate" class="form-select">
                {% for rate in vat_rates %}
                <option value="{{ (rate * 100) | int }}"
                  {% if sreq and sreq.vat_rate == (rate * 100) %}selected
                  {% elif not sreq and rate == 0.20 %}selected{% endif %}>
                  %{{ (rate * 100) | int }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <!-- Notlar -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Notlar</label>
            <textarea name="notes" class="form-control" rows="3"
                      placeholder="Muhasebe için ek bilgi...">{{ sreq.notes if sreq else '' }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-send me-1"></i>Talep Gönder
            </button>
            <a href="/sales/invoice-requests" class="btn btn-outline-secondary">İptal</a>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
