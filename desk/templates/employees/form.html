{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label fw-semibold">Ad Soyad</label>
              <input type="text" name="name" class="form-control" required value="{{ employee.name if employee else '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Unvan</label>
              <input type="text" name="title" class="form-control" value="{{ employee.title if employee else '' }}">
            </div>
          </div>
          <div class="row g-3 mt-0">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Departman</label>
              <input type="text" name="department" class="form-control" value="{{ employee.department if employee else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Başlangıç Tarihi</label>
              <input type="date" name="start_date" class="form-control" required value="{{ employee.start_date.isoformat() if employee and employee.start_date else '' }}">
            </div>
          </div>
          {% if employee %}
          <div class="row g-3 mt-0">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Ayrılış Tarihi</label>
              <input type="date" name="end_date" class="form-control" value="{{ employee.end_date.isoformat() if employee and employee.end_date else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Durum</label>
              <select name="active" class="form-select">
                <option value="1" {% if employee.active %}selected{% endif %}>Aktif</option>
                <option value="0" {% if not employee.active %}selected{% endif %}>Pasif</option>
              </select>
            </div>
          </div>
          {% endif %}
          <div class="row g-3 mt-0">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Brüt Maaş</label>
              <input type="number" name="gross_salary" step="0.01" class="form-control" value="{{ employee.gross_salary if employee else '0' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Net Maaş</label>
              <input type="number" name="net_salary" step="0.01" class="form-control" value="{{ employee.net_salary if employee else '0' }}">
            </div>
          </div>
          <div class="mb-3 mt-3">
            <label class="form-label fw-semibold">IBAN</label>
            <input type="text" name="iban" class="form-control" value="{{ employee.iban if employee else '' }}" placeholder="TR00 0000 0000 0000 0000 0000 00">
          </div>
          <div class="mb-3">
            <div class="form-check mt-1">
              <input type="checkbox" name="is_retired" value="1" id="isRetiredCheck" class="form-check-input"
                     {% if employee and employee.is_retired %}checked{% endif %}>
              <label class="form-check-label fw-semibold" for="isRetiredCheck">
                Emekli Çalışan (SGDP uygulanır)
              </label>
              <div class="form-text">İşaretlenirse bordro hesabında SGK yerine SGDP oranları kullanılır (%7,5/%22,5).</div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Notlar</label>
            <textarea name="notes" class="form-control" rows="3">{{ employee.notes if employee else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <a href="{% if employee %}/employees/{{ employee.id }}{% else %}/employees{% endif %}" class="btn btn-outline-secondary">İptal</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
